      parameters:
        - name: managed_node
          in: query
          required: false
          schema:
            type: integer
            description: Filter by source ManagedNode node_id
        - name: source_node
          in: query
          required: false
          schema:
            type: integer
        - name: target_node
          in: query
          required: false
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            description: >
