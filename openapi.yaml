  /ws/messages/:
    get:
      summary: WebSocket connection for real-time text messages
      description: |
        This endpoint provides a WebSocket connection for receiving real-time text messages.

        ## Connection
        Connect to this endpoint using the WebSocket protocol:
        ```
        ws://{host}/ws/messages/?token={jwt_token}
        ```

        The JWT token must be provided as a query parameter for authentication.

        ## Message Format
        Messages are sent as JSON objects with the same schema as the TextMessage model.

        ## Example
        ```javascript
        // Connect to the WebSocket
        const socket = new WebSocket(`ws://example.com/ws/messages/?token=${jwtToken}`);

        // Listen for messages
        socket.onmessage = (event) => {
          const message = JSON.parse(event.data);
          console.log('New message:', message);
        };
        ```
      tags: [Text Messages, WebSocket]
      security:
        - BearerAuth: []
      responses:
        '101':
          description: WebSocket connection established

  /ws/nodes/:
    get:
      summary: WebSocket connection for node commands (e.g. traceroute)
      description: |
        This endpoint provides a WebSocket connection for ManagedNode bots to receive
        commands from the server (e.g. traceroute requests). Used by meshtastic-bot when
        configured with a storage API and NodeAPIKey.

        ## Connection
        Connect using the WebSocket protocol with NodeAPIKey as a query parameter:
        ```
        ws://{host}/ws/nodes/?api_key={node_api_key}
        ```

        Authentication uses the same NodeAPIKey as packet ingest (X-API-Key header).
        For WebSocket, the key must be passed as the `api_key` query parameter.

        ## Commands
        The server pushes JSON commands to the client. Supported command types:

        - **traceroute**: `{"type": "traceroute", "target": <node_id>}` — requests the bot
          to run sendTraceRoute to the target node. TRACEROUTE_APP responses are uploaded
          via the packet ingest API.

        ## Example
        ```javascript
        const socket = new WebSocket(`ws://example.com/ws/nodes/?api_key=${nodeApiKey}`);
        socket.onmessage = (event) => {
          const cmd = JSON.parse(event.data);
          if (cmd.type === 'traceroute') {
            console.log('Traceroute to:', cmd.target);
          }
        };
        ```
      tags: [WebSocket]
      parameters:
        - name: api_key
          in: query
          required: true
          schema:
            type: string
            description: NodeAPIKey for authentication (same key used for packet ingest)
      responses:
        '101':
          description: WebSocket connection established
