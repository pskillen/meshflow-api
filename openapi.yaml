openapi: 3.1.0

info:
  title: Meshflow API
  version: 1.0.0
  description: API for managing Meshtastic networks and nodes

servers:
  - url: /api
    description: API base URL

tags:
  - name: Authentication
    description: JWT token management endpoints
  - name: Packets
    description: Packet ingestion and node information endpoints
  - name: Constellations
    description: Constellation management endpoints
  - name: Nodes
    description: Node and API key management endpoints
  - name: Text Messages
    description: Send and retrieve text messages between nodes
  - name: WebSocket
    description: WebSocket endpoints for real-time node commands
  - name: Traceroutes
    description: Traceroute history and manual triggering
  - name: Mesh Monitoring
    description: User watches on observed nodes for silence detection and offline verification

components:
  parameters:
    PaginationPage:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 1
        minimum: 1
        description: Page number for pagination
    PaginationPageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        default: 100
        minimum: 1
        maximum: 1000
        description: Number of items per page

  securitySchemes:
    BearerAuth:
      description: >
        A JWT token used by a user to authenticate with the API. The token is issued by the /token endpoint.
      type: http
      scheme: bearer
      bearerFormat: JWT
    NodeApiKeyAuth:
      description: >
        An API key used by a node (or a node's bot process) to authenticate with the API. These are always
        scoped to one constellation and one user, but may be used by multiple nodes .
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Error:
      type: object
      properties:
        status:
          type: string
          enum: [error]
        message:
          type: string

    Success:
      type: object
      properties:
        status:
          type: string
          enum: [success]
        message:
          type: string

    BaseIncomingPacket:
      type: object
      description: >
        A packet received from the mesh network. This is the base class for all packet types, and contains
        common fields that are present in all packets.
      properties:
        id:
          type: integer
          description: The packet ID as generated by the packet sender
        from:
          type: integer
          description: The ID of the node that sent the packet
        fromId:
          type: string
          description: The ID of the node that sent the packet, in Meshastic !hex format
        to:
          type: integer
          description: The ID of the node that was the intended recipient of the packet
          nullable: true
        toId:
          type: string
          nullable: true
          description: The ID of the node that was the intended recipient of the packet, in Meshastic !hex format
        channel:
          type: integer
          nullable: true
          description: The channel number on which the packet was received
        rxTime:
          type: integer
          description: The time the packet was received, as a Unix timestamp
        rxSnr:
          type: number
          nullable: true
          description: The signal-to-noise ratio of the packet
        hopLimit:
          type: integer
          nullable: true
          description: The number of hops the packet had remaining when it was received
        rxRssi:
          type: number
          nullable: true
          description: The received signal strength of the packet
        hopStart:
          type: integer
          nullable: true
          description: The initial number of hops the packet had when it was sent
        relayNode:
          type: integer
          nullable: true
          description: The ID of the node that relayed the packet
        pkiEncrypted:
          type: boolean
          nullable: true
          description: Whether the packet was encrypted using the node's public key
        nextHop:
          type: integer
          nullable: true
          description: The ID of the next hop node
        priority:
          type: string
          nullable: true
          description: The priority of the packet
        raw:
          type: string
          nullable: true
          description: The raw packet data

    TextMessagePacket:
      allOf:
        - $ref: '#/components/schemas/BaseIncomingPacket'
        - type: object
          properties:
            decoded:
              type: object
              properties:
                portnum:
                  type: string
                  enum: [TEXT_MESSAGE_APP]
                payload:
                  type: string
                bitfield:
                  type: integer
                  nullable: true
                text:
                  type: string
                  nullable: true
                  description: The text of the message
                replyId:
                  type: integer
                  nullable: true
                  description: The ID of the message being replied to
                emoji:
                  type: integer
                  nullable: true
                  description: If '1', the message is an emoji reply

    NodeInfoPacket:
      allOf:
        - $ref: '#/components/schemas/BaseIncomingPacket'
        - type: object
          properties:
            decoded:
              type: object
              properties:
                portnum:
                  type: string
                  enum: [NODEINFO_APP]
                payload:
                  type: string
                bitfield:
                  type: integer
                  nullable: true
                user:
                  type: object
                  properties:
                    id:
                      type: string
                      description: The ID of the node in Meshastic !hex format
                    shortName:
                      type: string
                      nullable: true
                      description: The short name of the node
                    longName:
                      type: string
                      nullable: true
                      description: The long name of the node
                    hwModel:
                      type: string
                      nullable: true
                      description: The hardware model of the node
                    publicKey:
                      type: string
                      nullable: true
                      description: The public key of the node
                    macaddr:
                      type: string
                      nullable: true
                      description: The MAC address of the node
                    role:
                      type: string
                      nullable: true
                      description: The Meshastic role of the node (e.g. CLIENT, ROUTER)
                      enum: [CLIENT, CLIENT_MUTE, CLIENT_HIDDEN, ROUTER, ROUTER_CLIENT, ROUTER_LATE, REPEATER, TRACKER, SENSOR, SIMULATOR]
                    raw:
                      type: string
                      nullable: true

    PositionPacket:
      allOf:
        - $ref: '#/components/schemas/BaseIncomingPacket'
        - type: object
          properties:
            decoded:
              type: object
              properties:
                portnum:
                  type: string
                  enum: [POSITION_APP]
                payload:
                  type: string
                bitfield:
                  type: integer
                  nullable: true
                position:
                  type: object
                  properties:
                    latitude:
                      type: number
                      nullable: true
                    latitudeI:
                      type: integer
                      nullable: true
                    longitude:
                      type: number
                      nullable: true
                    longitudeI:
                      type: integer
                      nullable: true
                    altitude:
                      type: number
                      nullable: true
                    heading:
                      type: number
                      nullable: true
                    locationSource:
                      type: string
                      nullable: true
                      enum: [INTERNAL, EXTERNAL, MANUAL, UNKNOWN]
                    precisionBits:
                      type: integer
                      nullable: true
                    time:
                      type: integer
                      nullable: true
                    groundSpeed:
                      type: number
                      nullable: true
                    groundTrack:
                      type: number
                      nullable: true
                    raw:
                      type: string
                      nullable: true

    DeviceTelemetryPacket:
      allOf:
        - $ref: '#/components/schemas/BaseIncomingPacket'
        - type: object
          properties:
            decoded:
              type: object
              properties:
                portnum:
                  type: string
                  enum: [TELEMETRY_APP]
                payload:
                  type: string
                bitfield:
                  type: integer
                  nullable: true
                telemetry:
                  type: object
                  properties:
                    deviceMetrics:
                      type: object
                      properties:
                        batteryLevel:
                          type: number
                          nullable: true
                        voltage:
                          type: number
                          nullable: true
                        channelUtilization:
                          type: number
                          nullable: true
                        airUtilTx:
                          type: number
                          nullable: true
                        uptimeSeconds:
                          type: integer
                          nullable: true
                    time:
                      type: integer
                    raw:
                      type: string
                      nullable: true

    LocalStatsTelemetryPacket:
      allOf:
        - $ref: '#/components/schemas/BaseIncomingPacket'
        - type: object
          properties:
            decoded:
              type: object
              properties:
                portnum:
                  type: string
                  enum: [TELEMETRY_APP]
                payload:
                  type: string
                bitfield:
                  type: integer
                  nullable: true
                telemetry:
                  type: object
                  properties:
                    localStats:
                      type: object
                      properties:
                        uptimeSeconds:
                          type: integer
                          nullable: true
                        channelUtilization:
                          type: number
                          nullable: true
                        airUtilTx:
                          type: number
                          nullable: true
                        numPacketsTx:
                          type: integer
                          nullable: true
                        numPacketsRx:
                          type: integer
                          nullable: true
                        numPacketsRxBad:
                          type: integer
                          nullable: true
                        numOnlineNodes:
                          type: integer
                          nullable: true
                        numTotalNodes:
                          type: integer
                          nullable: true
                        numRxDupe:
                          type: integer
                          nullable: true
                    time:
                      type: integer
                    raw:
                      type: string
                      nullable: true

    EnvironmentTelemetryPacket:
      allOf:
        - $ref: '#/components/schemas/BaseIncomingPacket'
        - type: object
          description: TELEMETRY_APP packet with environmentMetrics
          properties:
            decoded:
              type: object
              properties:
                portnum:
                  type: string
                  enum: [TELEMETRY_APP]
                telemetry:
                  type: object
                  properties:
                    environmentMetrics:
                      type: object
                      description: See meshtastic/telemetry.proto EnvironmentMetrics

    AirQualityTelemetryPacket:
      allOf:
        - $ref: '#/components/schemas/BaseIncomingPacket'
        - type: object
          description: TELEMETRY_APP packet with airQualityMetrics
          properties:
            decoded:
              type: object
              properties:
                portnum:
                  type: string
                  enum: [TELEMETRY_APP]
                telemetry:
                  type: object
                  properties:
                    airQualityMetrics:
                      type: object
                      description: See meshtastic/telemetry.proto AirQualityMetrics

    PowerTelemetryPacket:
      allOf:
        - $ref: '#/components/schemas/BaseIncomingPacket'
        - type: object
          description: TELEMETRY_APP packet with powerMetrics
          properties:
            decoded:
              type: object
              properties:
                portnum:
                  type: string
                  enum: [TELEMETRY_APP]
                telemetry:
                  type: object
                  properties:
                    powerMetrics:
                      type: object
                      description: See meshtastic/telemetry.proto PowerMetrics

    HealthTelemetryPacket:
      allOf:
        - $ref: '#/components/schemas/BaseIncomingPacket'
        - type: object
          description: TELEMETRY_APP packet with healthMetrics
          properties:
            decoded:
              type: object
              properties:
                portnum:
                  type: string
                  enum: [TELEMETRY_APP]
                telemetry:
                  type: object
                  properties:
                    healthMetrics:
                      type: object
                      description: See meshtastic/telemetry.proto HealthMetrics

    HostTelemetryPacket:
      allOf:
        - $ref: '#/components/schemas/BaseIncomingPacket'
        - type: object
          description: TELEMETRY_APP packet with hostMetrics
          properties:
            decoded:
              type: object
              properties:
                portnum:
                  type: string
                  enum: [TELEMETRY_APP]
                telemetry:
                  type: object
                  properties:
                    hostMetrics:
                      type: object
                      description: See meshtastic/telemetry.proto HostMetrics

    TrafficManagementStatsTelemetryPacket:
      allOf:
        - $ref: '#/components/schemas/BaseIncomingPacket'
        - type: object
          description: TELEMETRY_APP packet with trafficManagementStats
          properties:
            decoded:
              type: object
              properties:
                portnum:
                  type: string
                  enum: [TELEMETRY_APP]
                telemetry:
                  type: object
                  properties:
                    trafficManagementStats:
                      type: object
                      description: See meshtastic/telemetry.proto TrafficManagementStats

    TraceroutePacket:
      allOf:
        - $ref: '#/components/schemas/BaseIncomingPacket'
        - type: object
          description: TRACEROUTE_APP packet with route and routeBack
          properties:
            decoded:
              type: object
              properties:
                portnum:
                  type: string
                  enum: [TRACEROUTE_APP]
                traceroute:
                  type: object
                  properties:
                    route:
                      type: array
                      description: List of node IDs, path from source to dest
                      items:
                        type: integer
                    routeBack:
                      type: array
                      description: List of node IDs, path from dest back to source
                      items:
                        type: integer
                    snrTowards:
                      type: array
                      description: SNR per hop for forward path (scaled by 4 in protocol)
                      items:
                        type: number
                    snrBack:
                      type: array
                      description: SNR per hop for return path (scaled by 4 in protocol)
                      items:
                        type: number

    AutoTraceRoute:
      type: object
      description: A traceroute request (manual or auto) and its result
      properties:
        id:
          type: integer
        source_node:
          $ref: '#/components/schemas/ManagedNodeRead'
        target_node:
          $ref: '#/components/schemas/ObservedNode'
        trigger_type:
          type: string
          enum: [auto, user, external, monitor]
        triggered_by:
          type: integer
          nullable: true
        triggered_by_username:
          type: string
          nullable: true
        trigger_source:
          type: string
          nullable: true
        triggered_at:
          type: string
          format: date-time
        status:
          type: string
          enum: [pending, sent, completed, failed]
        route:
          type: array
          nullable: true
          items:
            type: object
            properties:
              node_id:
                type: integer
              snr:
                type: number
                nullable: true
        route_back:
          type: array
          nullable: true
          items:
            type: object
            properties:
              node_id:
                type: integer
              snr:
                type: number
                nullable: true
        route_nodes:
          type: array
          description: Enriched route with node details and position for map display
          readOnly: true
          items:
            type: object
            properties:
              node_id:
                type: integer
              node_id_str:
                type: string
              short_name:
                type: string
                nullable: true
              position:
                type: object
                nullable: true
                properties:
                  latitude:
                    type: number
                  longitude:
                    type: number
              snr:
                type: number
                nullable: true
        route_back_nodes:
          type: array
          description: Enriched route_back with node details and position for map display
          readOnly: true
          items:
            type: object
            properties:
              node_id:
                type: integer
              node_id_str:
                type: string
              short_name:
                type: string
                nullable: true
              position:
                type: object
                nullable: true
                properties:
                  latitude:
                    type: number
                  longitude:
                    type: number
              snr:
                type: number
                nullable: true
        raw_packet:
          type: string
          format: uuid
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        error_message:
          type: string
          nullable: true

    IncomingPacket:
      oneOf:
        - $ref: '#/components/schemas/TextMessagePacket'
        - $ref: '#/components/schemas/NodeInfoPacket'
        - $ref: '#/components/schemas/PositionPacket'
        - $ref: '#/components/schemas/DeviceTelemetryPacket'
        - $ref: '#/components/schemas/LocalStatsTelemetryPacket'
        - $ref: '#/components/schemas/EnvironmentTelemetryPacket'
        - $ref: '#/components/schemas/AirQualityTelemetryPacket'
        - $ref: '#/components/schemas/PowerTelemetryPacket'
        - $ref: '#/components/schemas/HealthTelemetryPacket'
        - $ref: '#/components/schemas/HostTelemetryPacket'
        - $ref: '#/components/schemas/TrafficManagementStatsTelemetryPacket'
        - $ref: '#/components/schemas/TraceroutePacket'

    Constellation:
      type: object
      description: A constellation is a group of nodes that are managed by a user or group of users.
      properties:
        id:
          type: integer
        name:
          type: string
          description: The name of the constellation
        description:
          type: string
          description: A description of the constellation
        created_by:
          type: integer
          description: The ID of the user that created the constellation
        channels:
          type: array
          description: The channels that are part of the constellation
          items:
            $ref: '#/components/schemas/MessageChannel'
        map_color:
          type: string
          description: The color used for the constellation on maps
        bot_default_ignore_portnums:
          type: string
          nullable: true
          description: Comma-separated portnums for IGNORE_PORTNUMS env var in generated docker-compose
        bot_default_hop_limit:
          type: integer
          nullable: true
          minimum: 1
          maximum: 7
          description: Default for TR_HOPS_LIMIT and TEXT_MESSAGE_MAX_HOPS env vars in generated docker-compose

    ObservedNode:
      type: object
      description: >
        A node that is observed by the system, usually inferred from ingested packets from the mesh network,
        but may also be manually added by a listener system.
      properties:
        internal_id:
          type: integer
          description: The internal ID of the observed node
        node_id:
          type: integer
          description: The ID of the node in the mesh network
        node_id_str:
          type: string
          description: The ID of the node in Meshastic !hex format
        mac_addr:
          type: string
          description: The MAC address of the node
        long_name:
          type: string
          description: The long name of the node
          nullable: true
        short_name:
          type: string
          description: The short name of the node
          nullable: true
        hw_model:
          type: string
          description: The hardware model of the node
          nullable: true
        public_key:
          type: string
          description: The public key of the node
          nullable: true
        role:
          type: integer
          description: The Meshtastic role of the node (e.g. CLIENT, ROUTER)
          nullable: true
        is_licensed:
          type: boolean
          description: Whether the node operator is a licensed ham radio operator
          nullable: true
        is_unmessagable:
          type: boolean
          description: Whether the node can receive messages
          nullable: true
        last_heard:
          type: string
          format: date-time
          description: The timestamp when the node was last heard from
          nullable: true
        inferred_max_hops:
          type: integer
          nullable: true
          description: >
            Inferred from packet hop_start when received; the node's max hops setting.
            Helps identify nodes with suboptimal hop limits (e.g. below recommended 7).
        environment_exposure:
          type: string
          enum: [unknown, indoor, outdoor, sheltered]
          description: Physical placement of environment sensors (weather suitability).
        weather_use:
          type: string
          enum: [unknown, include, exclude]
          description: Whether to include this node in weather-style aggregates.
        environment_settings_editable:
          type: boolean
          description: >
            True when the authenticated user may PATCH environment-settings for this node
            (staff or claim owner). Omitted or false for unauthenticated requests.
        latest_position:
          $ref: '#/components/schemas/Position'
        latest_device_metrics:
          $ref: '#/components/schemas/DeviceMetrics'
        latest_environment_metrics:
          $ref: '#/components/schemas/LatestEnvironmentMetrics'
        latest_power_metrics:
          $ref: '#/components/schemas/LatestPowerMetrics'
        latest_air_quality_metrics:
          $ref: '#/components/schemas/LatestAirQualityMetrics'
        latest_health_metrics:
          $ref: '#/components/schemas/LatestHealthMetrics'
        latest_host_metrics:
          $ref: '#/components/schemas/LatestHostMetrics'
        owner:
          type: object
          description: The owner of the node (if the node has been claimed by a user in the system)
          properties:
            id:
              type: integer
              description: The ID of the owner
              readOnly: true
            username:
              type: string
              description: The username of the owner
              readOnly: true
        claim:
          $ref: '#/components/schemas/ObservedNodeClaim'
          description: >
            The current user's claim for this node, if any. Only present for authenticated requests.
            Null when the user has no claim. Use accepted_at to distinguish pending vs accepted claims.

    ObservedNodeWatchSummary:
      type: object
      description: >
        Observed node fields included on NodeWatch responses for My Nodes / monitoring UI.
      properties:
        internal_id:
          type: string
          format: uuid
        node_id_str:
          type: string
        long_name:
          type: string
          nullable: true
        last_heard:
          type: string
          format: date-time
          nullable: true
        monitoring_verification_started_at:
          type: string
          format: date-time
          nullable: true
          description: Present when mesh monitoring is verifying reachability for this node.
        monitoring_offline_confirmed_at:
          type: string
          format: date-time
          nullable: true
          description: Present when mesh monitoring has confirmed offline after failed verification.

    NodeWatch:
      type: object
      properties:
        id:
          type: integer
        observed_node:
          $ref: '#/components/schemas/ObservedNodeWatchSummary'
        offline_after:
          type: integer
          description: Seconds without packets (last_heard) before verification may start.
        enabled:
          type: boolean
        created_at:
          type: string
          format: date-time

    NodeWatchCreate:
      type: object
      required: [observed_node_id]
      properties:
        observed_node_id:
          type: string
          format: uuid
          description: Target ObservedNode primary key (internal_id).
        offline_after:
          type: integer
          minimum: 1
          default: 7200
        enabled:
          type: boolean
          default: true

    NodeWatchUpdate:
      type: object
      properties:
        offline_after:
          type: integer
          minimum: 1
        enabled:
          type: boolean

    ObservedNodeEnvironmentSettingsPatch:
      type: object
      description: >
        Partial update for environment_exposure and/or weather_use. At least one field required.
        Allowed for staff or the user who has claimed the node (claimed_by).
      properties:
        environment_exposure:
          type: string
          enum: [unknown, indoor, outdoor, sheltered]
        weather_use:
          type: string
          enum: [unknown, include, exclude]

    ObservedNodeClaim:
      type: object
      description: >
        Embedded claim info for the current user on an ObservedNode. Returned as part of the node
        response to avoid a separate claim API call. Null when the user has no claim.
        Only the claim owner sees their own claim. Does NOT include claim_key (sensitive;
        use the claims API for that).
      nullable: true
      properties:
        created_at:
          type: string
          format: date-time
          description: When the claim was created
          readOnly: true
        accepted_at:
          type: string
          format: date-time
          description: When the claim was accepted (null if pending)
          nullable: true
          readOnly: true

    ObservedNodeSearch:
      type: object
      description: >
        A subset of ObservedNode fields returned by the search endpoint.
      properties:
        node_id:
          type: integer
          description: The ID of the node in the mesh network
        node_id_str:
          type: string
          description: The ID of the node in Meshastic !hex format
        long_name:
          type: string
          description: The long name of the node
          nullable: true
        short_name:
          type: string
          description: The short name of the node
          nullable: true
        public_key:
          type: string
          description: The public key of the node
          nullable: true
        last_heard:
          type: string
          format: date-time
          description: The timestamp when the node was last heard from
          nullable: true
        owner:
          type: object
          description: The owner of the node (if the node has been claimed by a user in the system)
          properties:
            id:
              type: integer
              description: The ID of the owner
              readOnly: true
            username:
              type: string
              description: The username of the owner
              readOnly: true

    NodeAPIKeyConstellation:
      type: object
      description: Constellation info for API key, includes bot setup defaults.
      properties:
        id:
          type: integer
          description: The ID of the constellation
        name:
          type: string
          description: The name of the constellation
        map_color:
          type: string
          description: The color used for the constellation on maps
        bot_default_ignore_portnums:
          type: string
          nullable: true
          description: Comma-separated portnums for IGNORE_PORTNUMS env var
        bot_default_hop_limit:
          type: integer
          nullable: true
          minimum: 1
          maximum: 7
          description: Default for TR_HOPS_LIMIT and TEXT_MESSAGE_MAX_HOPS env vars

    NodeAPIKey:
      type: object
      description: >
        An API key used by a node (or a node's bot process) to authenticate with the API. These are always
        scoped to one constellation and one user, but may be used by multiple nodes.
      properties:
        id:
          type: integer
          description: The ID of the API key
          readOnly: true
        key:
          type: string
          description: The API key secret value
          readOnly: true
        name:
          type: string
          description: The name of the API key
        constellation:
          $ref: '#/components/schemas/NodeAPIKeyConstellation'
          description: The constellation that the API key is scoped to
        created_at:
          type: string
          readOnly: true
          format: date-time
          description: The date and time the API key was created
        owner:
          type: integer
          readOnly: true
          description: The ID of the user that owns the API key
        last_used:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        is_active:
          type: boolean
          description: Whether the API key is active
        nodes:
          type: array
          description: The nodes that are associated with the API key
          readOnly: true
          items:
            type: integer

    NodeOwnerClaim:
      type: object
      description: >
        Represents a user's claim to an observed node. A claim must be accepted (by the node sending the claim_key) to be valid.
      properties:
        node:
          type: object
          description: The observed node being claimed
          readOnly: true
          properties:
            node_id:
              type: integer
              format: int64
              description: The numeric ID of the node
              readOnly: true
            node_id_str:
              type: string
              description: The node ID in hex format
              readOnly: true
            long_name:
              type: string
              description: The long name of the node
              readOnly: true
            short_name:
              type: string
              description: The short name of the node
              readOnly: true
            last_heard:
              type: string
              format: date-time
              description: The timestamp when the node was last heard from
              readOnly: true
              nullable: true
        user:
          type: integer
          description: The ID of the user making the claim
          readOnly: true
        claim_key:
          type: string
          description: The claim key that must be sent by the node to accept the claim
          readOnly: true
        created_at:
          type: string
          format: date-time
          description: The date and time the claim was created
          readOnly: true
        accepted_at:
          type: string
          format: date-time
          description: The date and time the claim was accepted (nullable)
          nullable: true
          readOnly: true

    ObservedNodeUpdate:
      type: object
      description: >
        Used to update an observed node directly. Normally observed nodes are updated automatically via the ingest endpoint,
        but this endpoint can be used to update node information directly (e.g. via the on_node_updated event)
      properties:
        id:
          type: integer
          description: The integer ID of the observed node
        macaddr:
          type: string
          description: The MAC address of the node
        hw_model:
          type: string
          nullable: true
          description: The hardware model of the node
        public_key:
          type: string
          nullable: true
          description: The public key of the node
        last_heard:
          type: string
          format: date-time
          description: The timestamp when the node was last heard from
          nullable: true
        user:
          type: object
          properties:
            long_name:
              type: string
              nullable: true
              description: The long name of the node
            short_name:
              type: string
              nullable: true
              description: The short name of the node
        position:
          $ref: '#/components/schemas/Position'
        device_metrics:
          $ref: '#/components/schemas/DeviceMetrics'

    ManagedNodeRead:
      type: object
      description: >
        A node that is owned and managed by a user. This model represents the administrative functions
        which the user can perform on the node, such as adding/removing API keys.
        Managed nodes submit data to the API (or a bot process does), and a managed node often has an
        associated ObservedNode.
      properties:
        node_id:
          type: integer
          format: int64
          description: Node ID
        long_name:
          type: string
          description: The long name of the node
          readOnly: true
        short_name:
          type: string
          description: The short name of the node
          readOnly: true
        last_heard:
          type: string
          format: date-time
          description: The timestamp when the node was last heard from
          readOnly: true
        node_id_str:
          type: string
          description: Node ID in hex format
          readOnly: true
        owner:
          type: object
          description: The owner of the node
          readOnly: true
          properties:
            id:
              type: integer
              description: The ID of the owner
              readOnly: true
            username:
              type: string
              description: The username of the owner
              readOnly: true
        constellation:
          type: object
          description: The constellation this node belongs to
          readOnly: true
          properties:
            id:
              type: integer
              description: The ID of the constellation
            name:
              type: string
              description: The name of the constellation
            map_color:
              type: string
              description: The color used for the constellation on maps
            bot_default_ignore_portnums:
              type: string
              nullable: true
              description: Comma-separated portnums for IGNORE_PORTNUMS env var
            bot_default_hop_limit:
              type: integer
              nullable: true
              minimum: 1
              maximum: 7
              description: Default for TR_HOPS_LIMIT and TEXT_MESSAGE_MAX_HOPS env vars
        allow_auto_traceroute:
          type: boolean
          description: If true, this node may be used for auto-scheduled traceroutes and manual triggers
          default: false
        position:
          type: object
          description: The latest known position of the node
          readOnly: true
          properties:
            latitude:
              type: number
              description: The latitude of the node
            longitude:
              type: number
              description: The longitude of the node
        latest_environment_metrics:
          $ref: '#/components/schemas/LatestEnvironmentMetrics'
        latest_power_metrics:
          $ref: '#/components/schemas/LatestPowerMetrics'
        latest_air_quality_metrics:
          $ref: '#/components/schemas/LatestAirQualityMetrics'
        latest_health_metrics:
          $ref: '#/components/schemas/LatestHealthMetrics'
        latest_host_metrics:
          $ref: '#/components/schemas/LatestHostMetrics'

    OwnedManagedNode:
