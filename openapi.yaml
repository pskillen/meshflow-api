    get:
      summary: List infrastructure nodes
      description: >
        Get observed nodes whose role is infrastructure (ROUTER, ROUTER_CLIENT, REPEATER, ROUTER_LATE).
        Optionally include CLIENT_BASE via include_client_base query parameter.
      tags: [Nodes]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PaginationPage'
        - $ref: '#/components/parameters/PaginationPageSize'
        - name: last_heard_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
            description: Filter nodes heard after this time (ISO 8601)
        - name: include_client_base
          in: query
          required: false
          schema:
            type: boolean
            default: false
            description: Include CLIENT_BASE role nodes
      responses:
        '200':
          description: List of infrastructure nodes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/ObservedNode'

  /nodes/observed-nodes/weather/:
    get:
      summary: List weather nodes
      description: >
        Get observed nodes that have reported environment metrics within the cutoff.
        Returns nodes with latest_environment_metrics and latest_position for map/cards.
      tags: [Nodes]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PaginationPage'
        - $ref: '#/components/parameters/PaginationPageSize'
        - name: environment_reported_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
            description: Filter nodes with environment metrics reported after this time (ISO 8601). Default 24h ago.
        - name: weather_use
          in: query
          required: false
          schema:
            type: string
          description: >
            Filter by weather_use. Repeat the parameter or use comma-separated values:
            unknown, include, exclude.
        - name: environment_exposure
          in: query
          required: false
          schema:
            type: string
          description: >
            Filter by environment_exposure. Repeat the parameter or use comma-separated values:
            unknown, indoor, outdoor, sheltered.
      responses:
        '400':
          description: Invalid filter value
        '200':
          description: List of weather nodes with environment metrics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                  - type: object
                    properties:
                      results:
                        type: array
                        items:
                          $ref: '#/components/schemas/ObservedNode'

  /nodes/device-metrics-bulk/:
    get:
      summary: Bulk device metrics for multiple nodes
      description: >
        Get device metrics (battery, channel utilisation, uptime) for multiple nodes in one request.
        Returns flat list; frontend groups by node_id for per-node charts.
        Reusable by Infrastructure, Monitor, My Nodes pages.
      tags: [Nodes]
      security:
        - BearerAuth: []
      parameters:
        - name: node_ids
          in: query
          required: true
          schema:
            type: string
            description: Comma-separated node IDs (e.g. "1,2,3,4,5")
        - name: start_date
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: end_date
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Flat list of device metrics with node_id, node_id_str, short_name per item
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        node_id:
                          type: integer
