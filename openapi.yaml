  # Social auth endpoints
  /auth/social/google/:
    get:
      summary: Get OAuth2 login URL
      description: >-
        This endpoint is used to get the OAuth2 login URL. The frontend should redirect the user to the URL.
      tags: [Authentication]
      responses:
        '200':
          description: Google OAuth2 login URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorization_url:
                    type: string

  /auth/social/google/callback/:
    get:
      summary: Callback URL from OAuth2 provider
      description: >-
        This endpoint is used to handle the OAuth2 callback. The auth provider will redirect the user to this
        endpoint with the code and state parameters. The API will then redirect the user to the frontend with the same
        code and state parameters.
      tags: [Authentication]
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to frontend with JWT

  /auth/social/google/token/:
    post:
      summary: Exchange OAuth2 code for JWT
      description: >-
        This endpoint is used to exchange the OAuth2 code for a JWT token. The frontend should make an async POST
        request to this endpoint with the code and state parameters. The API will then return a JWT token.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                state:
                  type: string
      responses:
        '200':
          description: JWT token returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SocialAuthJWTToken'

  /auth/social/github/:
    get:
      summary: Get OAuth2 login URL
      description: >-
