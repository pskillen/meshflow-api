  /auth/social/github/token/:
    post:
      summary: Exchange OAuth2 code for JWT
      description: >-
        This endpoint is used to exchange the OAuth2 code for a JWT token. The frontend should make an async POST
        request to this endpoint with the code and state parameters. The API will then return a JWT token.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
