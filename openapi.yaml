          enum: [admin, editor, viewer]

    BasicAuthJWTToken:
      description: >-
        JWT token returned from basic auth /token endpoint
        The token from this endpoint will contain the following claims:
        - `user_id`: The ID of the user
        - `username`: The username of the user
        - `is_staff`: Whether the user is a staff member
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string

    SocialAuthJWTToken:
      description: >-
        JWT token returned from social auth endpoints
        The token from this endpoint will contain the following claims:
        - `user_id`: The ID of the user
        Important: this token is a different format than the token from the basic auth /token endpoint.
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string
        user:
          type: object
          properties:
            pk:
              type: integer
            username:
              type: string
            email:
              type: string

    DiscordNotificationPrefs:
      type: object
      description: Discord DM notification eligibility for the current user.
      properties:
        discord_linked:
          type: boolean
          description: Whether a Discord social account is linked (OAuth).
        discord_notify_verified:
          type: boolean
          description: Whether DM target is verified (linked Discord uid matches stored id).

    DiscordTestNotificationResponse:
      type: object
      properties:
        detail:
          type: string


paths:
  /status/:
    get:
      summary: Get API status
      tags: [Authentication]
      responses:
        '200':
          description: API is operational
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]

  /token/:
    post:
      summary: Obtain JWT token
      description: >-
        The token from this endpoint will contain the following claims:
        - `user_id`: The ID of the user
        - `username`: The username of the user
        - `is_staff`: Whether the user is a staff member
        - `is_superuser`: Whether the user is a superuser
        Important: this token is a diffent format than the token from the social auth endpoints.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Token obtained successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BasicAuthJWTToken'
  /token/refresh/:
    post:
      summary: Refresh JWT token
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh:
                  type: string
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string

  /token/verify/:
    post:
      summary: Verify JWT token
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '200':
          description: Token is valid
        '401':
          description: Token is invalid

  # dj-rest-auth endpoints (core, no registration)
  /auth/login/:
    post:
      summary: Log in and obtain user JWT
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  access:
                    type: string
                  refresh:
                    type: string

  /auth/logout/:
    post:
      summary: Log out user (JWT blacklisted)
      tags: [Authentication]
