          in: query
          required: false
          schema:
            type: string
            enum: [auto, user, external, monitor]
        - name: triggered_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: triggered_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/PaginationPage'
        - $ref: '#/components/parameters/PaginationPageSize'
      responses:
        '200':
          description: Paginated list of traceroutes
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                  next:
                    type: string
                    nullable: true
                  previous:
                    type: string
                    nullable: true
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/AutoTraceRoute'

  /traceroutes/stats/:
    get:
      summary: Get traceroute statistics
      description: >
        Returns traceroute stats for the given timeframe: sources (by trigger_type),
        success/failure counts, top routers (intermediate nodes), per-source managed node
        totals (with success rate among finished runs only), and success over time (14d).
        All authenticated users.
      tags: [Traceroutes]
      security:
        - BearerAuth: []
      parameters:
        - name: triggered_at_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
            description: Filter stats by triggered_at >= value (ISO 8601)
      responses:
        '200':
          description: Traceroute statistics
          content:
            application/json:
              schema:
                type: object
                required: [sources, success_failure, top_routers, by_source, success_over_time]
                properties:
                  sources:
                    type: array
                    items:
                      type: object
                      properties:
                        trigger_type:
                          type: string
                        count:
                          type: integer
                  success_failure:
                    type: array
                    items:
                      type: object
                      properties:
                        status:
                          type: string
                        count:
                          type: integer
                  top_routers:
                    type: array
                    items:
                      type: object
                      properties:
                        node_id:
                          type: integer
                        node_id_str:
                          type: string
                        short_name:
                          type: string
                        count:
                          type: integer
                  by_source:
                    type: array
                    description: >
                      One row per source ManagedNode in the filtered period, ordered by total
                      runs descending. success_rate is completed / (completed + failed) when
                      that sum is positive; null if there are no finished runs (pending/sent
                      count toward total only).
                    items:
                      type: object
                      required:
                        - managed_node_id
                        - node_id
                        - node_id_str
                        - name
                        - short_name
                        - total
                        - completed
                        - failed
                        - success_rate
                      properties:
                        managed_node_id:
                          type: string
                          format: uuid
                        node_id:
                          type: integer
                        node_id_str:
                          type: string
                        name:
                          type: string
                        short_name:
                          type: string
                        total:
                          type: integer
                          description: All runs in the period (any status).
                        completed:
                          type: integer
                        failed:
                          type: integer
                        success_rate:
                          type: number
                          format: float
                          nullable: true
                          description: >
                            Fraction of finished runs that completed successfully.
                            Denominator is completed + failed only.
                  success_over_time:
                    type: array
                    items:
                      type: object
                      properties:
                        date:
                          type: string
                          format: date
                        completed:
                          type: integer
                        failed:
                          type: integer

  /traceroutes/heatmap-edges/:
    get:
      summary: Get heatmap edges and nodes
      description: >
        Aggregated traceroute edges and nodes for heatmap visualization.
        Queries Neo4j for bidirectional edge weights. All authenticated users.
      tags: [Traceroutes]
      security:
        - BearerAuth: []
      parameters:
        - name: triggered_at_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
            description: Filter edges by triggered_at >= value (ISO 8601)
        - name: constellation_id
          in: query
          required: false
          schema:
            type: integer
            description: Restrict to nodes in this constellation
        - name: bbox
          in: query
          required: false
          schema:
            type: string
            description: Viewport bounding box as min_lat,min_lon,max_lat,max_lon
        - name: edge_metric
          in: query
          required: false
          schema:
            type: string
            enum: [packets, snr]
            default: packets
            description: >
              packets - edge color/width by packet count; snr - by average link quality (SNR).
              When snr, only edges with SNR data are returned.
      responses:
        '200':
          description: Heatmap edges and nodes
          content:
            application/json:
              schema:
                type: object
                required: [edges, nodes, meta]
                properties:
                  edges:
                    type: array
                    items:
                      type: object
                      required: [from_node_id, to_node_id, from_lat, from_lng, to_lat, to_lng, weight]
                      properties:
                        from_node_id:
                          type: integer
                        to_node_id:
                          type: integer
                        from_lat:
                          type: number
                        from_lng:
                          type: number
                        to_lat:
                          type: number
                        to_lng:
                          type: number
                        weight:
                          type: integer
                        avg_snr:
                          type: number
                          description: Average SNR (when edge_metric=snr)
                  nodes:
                    type: array
                    items:
                      type: object
                      required: [node_id, node_id_str, lat, lng]
                      properties:
                        node_id:
                          type: integer
                        node_id_str:
                          type: string
                        lat:
                          type: number
                        lng:
                          type: number
                        short_name:
                          type: string
                        long_name:
                          type: string
                  meta:
                    type: object
                    properties:
                      active_nodes_count:
                        type: integer
                      total_trace_routes_count:
                        type: integer
        '503':
          description: Neo4j unavailable

  /traceroutes/can_trigger/:
    get:
      summary: Check if user can trigger traceroutes
      description: Returns whether the current user has at least one triggerable node (staff, constellation admin/editor, or ManagedNode owner). Nodes must have allow_auto_traceroute and recent packet ingestion as PacketObservation.observer (same window as SCHEDULE_TRACEROUTE_SOURCE_RECENCY_SECONDS for the Celery scheduler).
      tags: [Traceroutes]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Permission check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  can_trigger:
                    type: boolean

  /traceroutes/triggerable-nodes/:
    get:
      summary: List nodes user can trigger traceroutes from
      description: Returns ManagedNodes the current user can trigger traceroutes from (staff=all, constellation admin/editor=nodes in their constellations, owner=their nodes). Only nodes with allow_auto_traceroute=True and recent packet ingestion as observer (SCHEDULE_TRACEROUTE_SOURCE_RECENCY_SECONDS), matching Celery schedule_traceroutes source selection.
      tags: [Traceroutes]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of triggerable managed nodes
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [node_id, node_id_str, short_name, long_name, allow_auto_traceroute, constellation]
                  properties:
                    node_id:
                      type: integer
                    node_id_str:
                      type: string
                    short_name:
                      type: string
                    long_name:
                      type: string
                    allow_auto_traceroute:
                      type: boolean
                    constellation:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        map_color:
                          type: string

  /traceroutes/trigger/:
    post:
      summary: Trigger a traceroute
      description: Manually trigger a traceroute. Requires permission to trigger from the source node (staff, constellation admin/editor, or ManagedNode owner). The source must have allow_auto_traceroute and recent packet ingestion as observer (same eligibility as schedule_traceroutes).
      tags: [Traceroutes]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - managed_node_id
              properties:
                managed_node_id:
                  type: integer
                  description: Node ID of the ManagedNode (source/bot)
                target_node_id:
                  type: integer
                  description: Target ObservedNode node_id (optional for auto-selection)
                  nullable: true
      responses:
        '201':
          description: Traceroute triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoTraceRoute'
        '400':
          description: Bad request (e.g. allow_auto_traceroute disabled, or no recent packet ingestion from monitor bot)
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
        '403':
          description: Forbidden
        '404':
          description: ManagedNode or ObservedNode not found
        '429':
          description: Rate limited - node's last traceroute was less than 60s ago
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Traceroute rate limited. This node's last traceroute was less than 30s ago. Try again in 25s."

  /traceroutes/{id}/:
    get:
      summary: Get traceroute detail
      description: Get a single AutoTraceRoute by ID.
      tags: [Traceroutes]
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Traceroute detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AutoTraceRoute'
        '404':
          description: Not found

