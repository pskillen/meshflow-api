---
# Docker Compose for running integration tests locally.
# Start with: docker compose -f docker-compose.test.yaml up -d
# Then: seed_integration_tests, then pytest tests/integration/

name: meshflow-test

services:
  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: redis
    ports:
      - "6379:6379"
    networks:
      - meshflow_net

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - meshflow_net

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: meshflow
      POSTGRES_PASSWORD: meshflow
      POSTGRES_DB: meshflow
    ports:
      - "5432:5432"
    networks:
      - meshflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    command: python manage.py migrate && python manage.py run_deploy_tasks
    environment:
      DEBUG: true
      POSTGRES_DB: meshflow
      POSTGRES_USER: meshflow
      POSTGRES_PASSWORD: meshflow
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - meshflow_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DEBUG: true
      POSTGRES_DB: meshflow
      POSTGRES_USER: meshflow
      POSTGRES_PASSWORD: meshflow
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j
    ports:
      - "8000:8000"
    depends_on:
      migrations:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - meshflow_net

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A Meshflow worker -l info
    environment:
      DEBUG: true
      POSTGRES_DB: meshflow
      POSTGRES_USER: meshflow
      POSTGRES_PASSWORD: meshflow
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
    depends_on:
      migrations:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - meshflow_net

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A Meshflow beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: true
      POSTGRES_DB: meshflow
      POSTGRES_USER: meshflow
      POSTGRES_PASSWORD: meshflow
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    networks:
      - meshflow_net

networks:
  meshflow_net:
