---
name: meshflow

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - meshflow_net

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/neo4j}
    volumes:
      - neo4j_data:/data
    networks:
      - meshflow_net

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    # TODO: always change these in a real working environment
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./deploy/docker/initdb:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - meshflow_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meshflow-migrations
    restart: no
    command: ["sh", "-c", "python manage.py migrate && python manage.py run_deploy_tasks"]
    environment:
      DEBUG: true
      POSTGRES_DB: meshflow
      POSTGRES_USER: meshflow
      POSTGRES_PASSWORD: meshflow
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - meshflow_net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meshflow-manager
    restart: unless-stopped
    environment:
      DEBUG: true
      POSTGRES_DB: meshflow
      POSTGRES_USER: meshflow
      POSTGRES_PASSWORD: meshflow
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j}
      ALLOWED_HOSTS: meshflow-manager
      RF_PROPAGATION_ASSET_DIR: /var/meshflow/generated-assets/rf-propagation
      RF_PROPAGATION_ENGINE_URL: http://rf-propagation:8080
    ports:
      - "8000:8000"
    volumes:
      - rf_assets:/var/meshflow/generated-assets/rf-propagation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    networks:
      - meshflow_net

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meshflow-celery-worker
    restart: unless-stopped
    command: celery -A Meshflow worker -l info
    environment:
      DEBUG: true
      POSTGRES_DB: meshflow
      POSTGRES_USER: meshflow
      POSTGRES_PASSWORD: meshflow
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j}
      RF_PROPAGATION_ASSET_DIR: /var/meshflow/generated-assets/rf-propagation
    volumes:
      - rf_assets:/var/meshflow/generated-assets/rf-propagation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    networks:
      - meshflow_net

  celery-rf-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meshflow-celery-rf-worker
    restart: unless-stopped
    command: celery -A Meshflow worker -Q rf_renders -l info --concurrency=1
    environment:
      DEBUG: true
      POSTGRES_DB: meshflow
      POSTGRES_USER: meshflow
      POSTGRES_PASSWORD: meshflow
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j}
      RF_PROPAGATION_ASSET_DIR: /var/meshflow/generated-assets/rf-propagation
      RF_PROPAGATION_ENGINE_URL: http://rf-propagation:8080
    volumes:
      - rf_assets:/var/meshflow/generated-assets/rf-propagation
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rf-propagation:
        condition: service_started
    networks:
      - meshflow_net

  rf-propagation:
    image: ghcr.io/pskillen/meshflow-rf-propagation:${RF_PROPAGATION_IMAGE_TAG:-latest-dev}
    container_name: meshflow-rf-propagation
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/3
    depends_on:
      redis:
        condition: service_started
    networks:
      - meshflow_net

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meshflow-celery-beat
    restart: unless-stopped
    command: celery -A Meshflow beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: true
      POSTGRES_DB: meshflow
      POSTGRES_USER: meshflow
      POSTGRES_PASSWORD: meshflow
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/1
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_started
    networks:
      - meshflow_net

  docs:
    build:
      context: .
      dockerfile: Dockerfile-redocly
    container_name: meshflow-docs
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - meshflow_net

volumes:
  pg_data:
  neo4j_data:
  rf_assets:

networks:
  meshflow_net:
