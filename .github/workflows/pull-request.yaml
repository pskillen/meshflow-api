name: Pull Request

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Meshflow/requirements.txt
          pip install pytest pytest-django pytest-cov pytest-asyncio black isort flake8 flake8-quotes

      - name: Run linting
        run: |
          black . --check
          isort . --check-only
          flake8 .
        working-directory: Meshflow/

      - name: Run tests with coverage
        run: |
          mkdir -p reports
          python -m pytest Meshflow/ -v --junit-xml=reports/junit.xml

      - name: Test Report
        uses: dorny/test-reporter@v2
        with:
          name: pytest
          path: reports/junit.xml
          reporter: python-xunit
        if: always()

  build-and-smoke:
    needs: verify
    runs-on: ubuntu-latest
    env:
      MESHFLOW_API_URL: http://localhost:8000
      MESHFLOW_NODE_API_KEY: integration-test-key-a1b2c3d4e5f6
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Build and launch stack
        run: docker compose -f docker-compose.test.yaml build && docker compose -f docker-compose.test.yaml up -d

      - name: Smoke test
        run: |
          HEALTH_CHECK_URL="http://localhost:8000/api/status/"
          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -s -f -o /dev/null "$HEALTH_CHECK_URL"; then
              echo "Health check passed!"
              exit 0
            fi

            echo "Health check failed, retrying in 5 seconds..."
            sleep 5
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

          echo "Health check failed after $MAX_RETRIES attempts"
          docker compose -f docker-compose.test.yaml logs api
          exit 1

      - name: Seed integration test data
        run: docker compose -f docker-compose.test.yaml run --rm api python manage.py seed_integration_tests

      - name: Set up Python for integration tests
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Run integration tests
        run: |
          pip install -r tests/requirements-integration.txt
          mkdir -p reports
          pytest tests/integration/ -v --junit-xml=reports/integration-tests.xml

      - name: Integration Test Report
        uses: dorny/test-reporter@v2
        with:
          name: integration-tests
          path: reports/integration-tests.xml
          reporter: python-xunit
        if: always()

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.test.yaml down -v
          docker system prune -f
