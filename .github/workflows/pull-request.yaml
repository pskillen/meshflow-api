name: Pull Request

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Meshflow/requirements.txt
          pip install pytest pytest-django pytest-cov black isort flake8 flake8-quotes

      - name: Run linting
        run: |
          black . --check
          isort . --check-only
          flake8 .
        working-directory: Meshflow/

      - name: Run tests with coverage
        run: |
          mkdir -p reports
          python -m pytest Meshflow/ -v --junit-xml=reports/junit.xml

      - name: Test Report
        uses: dorny/test-reporter@v2
        with:
          name: pytest
          path: reports/junit.xml
          reporter: python-xunit
        if: always()

  build:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=pr-${{ github.event.pull_request.number }}

      - name: Build migrations Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:pr-${{ github.event.pull_request.number }}-migrations
          file: Dockerfile-migrations
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=pr-${{ github.event.pull_request.number }}

  smoke-and-integration:
    needs: build
    runs-on: ubuntu-latest
    env:
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_EVENT_PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
      MESHFLOW_API_URL: http://localhost:8000
      MESHFLOW_NODE_API_KEY: integration-test-key-a1b2c3d4e5f6
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Launch stack
        run: docker compose -f docker-compose.ci-pr.yaml up -d

      - name: Smoke test
        run: |
          HEALTH_CHECK_URL="http://localhost:8000/api/status/"
          MAX_RETRIES=5
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            if curl -s -f -o /dev/null "$HEALTH_CHECK_URL"; then
              echo "Health check passed!"
              exit 0
            fi

            echo "Health check failed, retrying in 5 seconds..."
            sleep 5
            RETRY_COUNT=$((RETRY_COUNT + 1))
          done

          echo "Health check failed after $MAX_RETRIES attempts"
          docker compose -f docker-compose.ci-pr.yaml logs api
          exit 1

      - name: Seed integration test data
        run: docker compose -f docker-compose.ci-pr.yaml run --rm api python manage.py seed_integration_tests

      - name: Set up Python for integration tests
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Run integration tests
        run: |
          pip install -r tests/requirements-integration.txt
          mkdir -p reports
          pytest tests/integration/ -v --junit-xml=reports/integration-tests.xml

      - name: Integration Test Report
        uses: dorny/test-reporter@v2
        with:
          name: integration-tests
          path: reports/integration-tests.xml
          reporter: python-xunit
        if: always()

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.ci-pr.yaml down -v
          docker system prune -f
