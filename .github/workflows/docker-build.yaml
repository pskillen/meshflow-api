name: docker-build-and-push

on:
  workflow_call:
    inputs:
      VERSION_LABEL:
        required: true
        type: string
      ENVIRONMENT:
        required: true
        type: string
        description: "dev | preprod | prod"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ inputs.ENVIRONMENT == 'dev' && 'latest-dev' || inputs.VERSION_LABEL }}
          build-args: |
            VERSION=${{ inputs.VERSION_LABEL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Docs Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile-redocly
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ inputs.ENVIRONMENT == 'dev' && 'latest-dev-docs' || inputs.VERSION_LABEL }}-docs
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tag-and-cleanup:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    if: inputs.ENVIRONMENT != 'dev'

    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag for pre-release (latest-rc + latest-rc-docs)
        if: inputs.ENVIRONMENT == 'preprod'
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest-rc \
            ghcr.io/${{ github.repository }}:${{ inputs.VERSION_LABEL }}
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest-rc-docs \
            ghcr.io/${{ github.repository }}:${{ inputs.VERSION_LABEL }}-docs

      - name: Tag for release (latest + semver components for API and docs)
        if: inputs.ENVIRONMENT == 'prod'
        run: |
          VERSION="${{ inputs.VERSION_LABEL }}"
          MAJOR=$(echo "${VERSION}" | cut -d. -f1)
          MINOR=$(echo "${VERSION}" | cut -d. -f2)

          # API tags
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest \
            -t ghcr.io/${{ github.repository }}:${VERSION} \
            ghcr.io/${{ github.repository }}:${VERSION}
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:${MAJOR} \
            ghcr.io/${{ github.repository }}:${VERSION}
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:${MAJOR}.${MINOR} \
            ghcr.io/${{ github.repository }}:${VERSION}

          # Docs tags
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:latest-docs \
            -t ghcr.io/${{ github.repository }}:${VERSION}-docs \
            ghcr.io/${{ github.repository }}:${VERSION}-docs
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:${MAJOR}-docs \
            ghcr.io/${{ github.repository }}:${VERSION}-docs
          docker buildx imagetools create \
            -t ghcr.io/${{ github.repository }}:${MAJOR}.${MINOR}-docs \
            ghcr.io/${{ github.repository }}:${VERSION}-docs

      - name: Delete untagged images
        uses: quartx-analytics/ghcr-cleaner@v1
        with:
          owner-type: user
          token: ${{ secrets.GITHUB_TOKEN }}
          repository_owner: ${{ github.repository_owner }}
          repository-name: ${{ github.repository }}
          delete-untagged: true

  cleanup-dev:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    if: inputs.ENVIRONMENT == 'dev'

    steps:
      - name: Delete untagged images
        uses: quartx-analytics/ghcr-cleaner@v1
        with:
          owner-type: user
          token: ${{ secrets.GITHUB_TOKEN }}
          repository_owner: ${{ github.repository_owner }}
          repository-name: ${{ github.repository }}
          delete-untagged: true
