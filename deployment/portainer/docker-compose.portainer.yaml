# Portainer / docker compose stack for Meshflow (API, UI, workers, data stores).
# Deploy multiple environments on one host: give each stack a unique name in Portainer
# and a separate env file with distinct ports, DB names, and public URLs. Compose
# prefixes project volumes automatically; override PG_NET_NAME / MONITORING_NET_NAME if
# your shared external networks use different names per environment.

---

services:

  react-ui:
    image: ghcr.io/pskillen/meshtastic-bot-ui:${UI_TAG}
    restart: unless-stopped
    environment:
      MESHBOT_API_URL: ${API_PUBLIC_URL}
      MESHBOT_API_BASE_PATH: /api
      MESHBOT_API_TIMEOUT: 10000
      NODE_ENV: production
      MAPBOX_TOKEN: ${MAPBOX_TOKEN}
    ports:
      - "${UI_EXT_PORT}:80"

  migrations:
    image: ghcr.io/pskillen/meshflow-api:${DJANGO_TAG}
    command: ["sh", "-c", "python manage.py migrate && python manage.py run_deploy_tasks"]
    restart: no
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
    networks:
      - pg_net

  redoc:
    image: ghcr.io/pskillen/meshflow-api:${DJANGO_TAG}-docs
    restart: no
    ports:
      - "${ANCILLARY_PORTS_BIND_HOST}:${REDOC_EXT_PORT}:8080"

  redis:
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    ports:
      - "${ANCILLARY_PORTS_BIND_HOST}:${REDIS_EXT_PORT}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - redis

  neo4j:
    image: neo4j:${NEO4J_IMAGE}
    restart: unless-stopped
    ports:
      - "${ANCILLARY_PORTS_BIND_HOST}:${NEO4J_HTTP_PORT}:7474"
      - "${ANCILLARY_PORTS_BIND_HOST}:${NEO4J_BOLT_PORT}:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    networks:
      - neo4j

  api:
    image: ghcr.io/pskillen/meshflow-api:${DJANGO_TAG}
    restart: unless-stopped
    environment:
      # Runtime env
      DEBUG: ${DEBUG}

      # Django settings
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS}
      SECRET_KEY: ${DJANGO_SECRET_KEY}

      # Database
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}

      # Monitoring
      PROMETHEUS_PASSWORD: ${PROMETHEUS_PASSWORD}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # NEO4J
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}

      # RF propagation (Site Planner engine + on-disk PNG cache)
      RF_PROPAGATION_ENGINE_URL: http://site-planner:8080
      RF_PROPAGATION_ASSET_DIR: /var/meshflow/generated-assets/rf-propagation
      RF_PROPAGATION_DEFAULT_RADIUS_M: ${RF_PROPAGATION_DEFAULT_RADIUS_M:-}
      RF_PROPAGATION_COLORMAP: ${RF_PROPAGATION_COLORMAP:-}
      RF_PROPAGATION_HIGH_RESOLUTION: ${RF_PROPAGATION_HIGH_RESOLUTION:-}
      RF_PROPAGATION_MIN_DBM: ${RF_PROPAGATION_MIN_DBM:-}
      RF_PROPAGATION_MAX_DBM: ${RF_PROPAGATION_MAX_DBM:-}
      RF_PROPAGATION_SIGNAL_THRESHOLD_DBM: ${RF_PROPAGATION_SIGNAL_THRESHOLD_DBM:-}

      # Social auth
      CALLBACK_URL_BASE: ${CALLBACK_URL_BASE}
      FRONTEND_URL: ${WEB_PUBLIC_URL}
      AUTH_SITE_ID: 0
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}

      # Discord notifications
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}

      # DX event detection
      DX_MONITORING_DETECTION_ENABLED: true

    ports:
      - "${API_EXT_PORT}:8000"
    volumes:
      - rf_assets:/var/meshflow/generated-assets/rf-propagation
    networks:
      - pg_net
      - monitoring
      - redis
      - neo4j
      - site-planner

  celery-worker:
    image: ghcr.io/pskillen/meshflow-api:${DJANGO_TAG}
    restart: unless-stopped
    command: celery -A Meshflow worker -l info
    environment:
      DEBUG: ${DEBUG:-false}
      FRONTEND_URL: ${WEB_PUBLIC_URL}
      # Database
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # NEO4J
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      # Discord notifications
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
    networks:
      - pg_net
      - redis
      - neo4j

  celery-rf-worker:
    image: ghcr.io/pskillen/meshflow-api:${DJANGO_TAG}
    restart: unless-stopped
    command: celery -A Meshflow worker -Q rf_renders -l info --concurrency=1
    environment:
      DEBUG: ${DEBUG:-false}
      FRONTEND_URL: ${WEB_PUBLIC_URL}
      # Database
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # NEO4J
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      # RF propagation
      RF_PROPAGATION_ENGINE_URL: http://site-planner:8080
      RF_PROPAGATION_ASSET_DIR: /var/meshflow/generated-assets/rf-propagation
      RF_PROPAGATION_DEFAULT_RADIUS_M: ${RF_PROPAGATION_DEFAULT_RADIUS_M:-}
      RF_PROPAGATION_COLORMAP: ${RF_PROPAGATION_COLORMAP:-}
      RF_PROPAGATION_HIGH_RESOLUTION: ${RF_PROPAGATION_HIGH_RESOLUTION:-}
      RF_PROPAGATION_MIN_DBM: ${RF_PROPAGATION_MIN_DBM:-}
      RF_PROPAGATION_MAX_DBM: ${RF_PROPAGATION_MAX_DBM:-}
      RF_PROPAGATION_SIGNAL_THRESHOLD_DBM: ${RF_PROPAGATION_SIGNAL_THRESHOLD_DBM:-}
    volumes:
      - rf_assets:/var/meshflow/generated-assets/rf-propagation
    networks:
      - pg_net
      - redis
      - neo4j
      - site-planner

  celery-beat:
    image: ghcr.io/pskillen/meshflow-api:${DJANGO_TAG}
    restart: unless-stopped
    command: celery -A Meshflow beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: ${DEBUG:-false}
      # Database
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # NEO4J
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    networks:
      - pg_net
      - redis
      - neo4j

  site-planner:
    image: ghcr.io/pskillen/meshflow-rf-propagation:${RF_PROPAGATION_TAG:-latest-dev}
    restart: unless-stopped
    ports:
      - "${ANCILLARY_PORTS_BIND_HOST}:${RF_PROPAGATION_HTTP_PORT}:8080"
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      SDF_DIR: /data/sdf
    networks:
      - redis
      - site-planner
    depends_on:
      - redis

networks:
  pg_net:
    external: true
  monitoring:
    external: true
  redis:
  neo4j:
  site-planner:

volumes:
  redis_data:
  neo4j_data:
  rf_assets:
